name: Feature request
description: Suggest a new feature or improvement.
title: "[Feature]: "
labels: ["enhancement", "triage"]
body:
  - type: markdown
    attributes:
      value: |
        Thanks for the idea! Please describe the **problem** first, then the
        proposed solution. Problem-first requests get implemented faster.

  - type: textarea
    id: problem
    attributes:
      label: Problem
      description: What are you trying to do that DPlex makes hard today?
      placeholder: |
        When I'm working across 4 projects with Copilot, I can't easily…
    validations:
      required: true

  - type: textarea
    id: proposal
    attributes:
      label: Proposed solution
      description: What do you think DPlex should do?
    validations:
      required: true

  - type: textarea
    id: alternatives
    attributes:
      label: Alternatives considered
      description: Other approaches you thought about and why you rejected them.

  - type: textarea
    id: context
    attributes:
      label: Additional context
      description: Mockups, links to related tools, or any extra background.

  - type: checkboxes
    id: terms
    attributes:
      label: Before submitting
      options:
        - label: I searched existing issues and discussions for similar requests.
          required: true
