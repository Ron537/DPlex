name: Deploy Pages

on:
  push:
    branches: [main]
    paths:
      - 'site/**'
      - 'docs/assets/**'
      - 'scripts/build-changelog.mjs'
      - 'scripts/build-site.mjs'
      - 'CHANGELOG.md'
      - '.github/workflows/pages.yml'
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

# Only one deploy at a time; queue subsequent runs.
concurrency:
  group: pages
  cancel-in-progress: false

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: 'npm'

      - name: Install dependencies
        # The site builder uses the `ignore` npm package to respect
        # .gitignore. Skip lifecycle scripts (no Electron download needed
        # for a static-site build) to keep this fast.
        run: npm ci --ignore-scripts --omit=optional

      - name: Build site
        run: node scripts/build-site.mjs

      - name: Upload artifact
        uses: actions/upload-pages-artifact@v5
        with:
          path: _site

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Deploy
        id: deployment
        uses: actions/deploy-pages@v5
