name: Deploy Pages

on:
  push:
    branches: [main]
    paths:
      - 'site/**'
      - 'docs/assets/**'
      - '.github/workflows/pages.yml'
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

# Only one deploy at a time; queue subsequent runs.
concurrency:
  group: pages
  cancel-in-progress: false

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - name: Assemble site bundle
        run: |
          set -e
          mkdir -p _site
          cp -R site/. _site/
          # Co-locate the screenshots so the index.html's `./assets/...`
          # references resolve under the Pages URL.
          mkdir -p _site/assets
          cp -R docs/assets/. _site/assets/

      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: _site

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Deploy
        id: deployment
        uses: actions/deploy-pages@v4
