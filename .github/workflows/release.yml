name: Release

on:
  push:
    tags:
      - "v*"
  # Manual trigger for dry runs (builds artifacts without publishing).
  workflow_dispatch:
    inputs:
      dry-run:
        description: "Build only (no publish)"
        required: false
        default: "true"

permissions:
  contents: write
  # Required for actions/attest-build-provenance to mint Sigstore-signed
  # provenance attestations for each release artifact.
  id-token: write
  attestations: write

jobs:
  build:
    name: Build ${{ matrix.os }}
    runs-on: ${{ matrix.os }}
    timeout-minutes: 40
    env:
      # `electron-vite build` peaks well above Node's default 2 GB heap
      # because of the Monaco editor chunk (~6 MB) plus Vite 7's larger
      # in-memory graph. Raising the limit globally for the build job
      # keeps macOS / Linux / Windows on the same configuration and
      # avoids "Allocation failed - JavaScript heap out of memory" OOMs
      # on macos-latest (which exits 134 mid-build, see release run
      # 25514990847).
      NODE_OPTIONS: --max-old-space-size=8192
    strategy:
      fail-fast: false
      matrix:
        os: [macos-latest, windows-latest, ubuntu-latest]
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Setup Node
        uses: actions/setup-node@v6
        with:
          node-version: 22
          cache: npm

      - name: Install dependencies
        run: npm ci

      # macOS signing + notarization: populated from repository secrets
      # when available. Missing secrets produce an unsigned .app / .dmg —
      # we then ad-hoc sign it below so Gatekeeper at least skips the
      # "is damaged" error path. Users still see the unidentified-developer
      # warning on first launch (right-click Open clears it).
      - name: Build macOS
        if: matrix.os == 'macos-latest'
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          CSC_LINK: ${{ secrets.MAC_CSC_LINK }}
          CSC_KEY_PASSWORD: ${{ secrets.MAC_CSC_KEY_PASSWORD }}
          APPLE_ID: ${{ secrets.APPLE_ID }}
          APPLE_APP_SPECIFIC_PASSWORD: ${{ secrets.APPLE_APP_SPECIFIC_PASSWORD }}
          APPLE_TEAM_ID: ${{ secrets.APPLE_TEAM_ID }}
        run: npm run build:mac:ci -- --publish ${{ github.event_name == 'workflow_dispatch' && 'never' || 'always' }}

      - name: Build Windows
        if: matrix.os == 'windows-latest'
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          CSC_LINK: ${{ secrets.WIN_CSC_LINK }}
          CSC_KEY_PASSWORD: ${{ secrets.WIN_CSC_KEY_PASSWORD }}
        run: npm run build:win -- --publish ${{ github.event_name == 'workflow_dispatch' && 'never' || 'always' }}

      - name: Build Linux
        if: matrix.os == 'ubuntu-latest'
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: npm run build:linux -- --publish ${{ github.event_name == 'workflow_dispatch' && 'never' || 'always' }}

      # Sigstore-signed build provenance — proves "this artifact was built
      # from this commit by this workflow on GitHub-hosted runners". Free
      # via OIDC; verifiable with `gh attestation verify`. Lets paranoid
      # users trust the binary even though we don't yet ship a paid
      # Developer ID or Authenticode signature.
      #
      # NOTE: this step requires either a public repo OR an org with
      # Advanced Security. On personal private repos GitHub returns
      # "Feature not available for user-owned private repositories" —
      # we mark the step continue-on-error so the build itself still
      # publishes its artifacts. Once the repo is public, attestations
      # generate cleanly with no other change required.
      - name: Generate build provenance
        if: github.event_name != 'workflow_dispatch' || github.event.inputs.dry-run != 'true'
        continue-on-error: true
        uses: actions/attest-build-provenance@v4
        with:
          subject-path: |
            dist/*.dmg
            dist/*.zip
            dist/*.exe
            dist/*.msi
            dist/*.AppImage
            dist/*.deb
            dist/*.snap

      # Always upload build artifacts so a dry run still produces
      # downloadable installers for local testing before cutting a tag.
      - name: Upload build artifacts
        uses: actions/upload-artifact@v7
        with:
          name: dplex-${{ matrix.os }}
          path: |
            dist/*.dmg
            dist/*.zip
            dist/*.exe
            dist/*.msi
            dist/*.AppImage
            dist/*.deb
            dist/*.snap
            dist/latest*.yml
          if-no-files-found: ignore
          retention-days: 14

  # After all platform builds finish, replace the auto-generated release
  # body (which electron-builder fills with the commit message) with the
  # categorized release notes from .github/release.yml plus a curated
  # downloads table. Tag pushes only — dry runs leave the draft alone.
  polish-release-notes:
    name: Polish release notes
    needs: build
    if: startsWith(github.ref, 'refs/tags/v')
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v6

      - name: Generate categorized notes
        id: notes
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          TAG: ${{ github.ref_name }}
        run: |
          set -e
          # Ask GitHub to generate categorized notes per .github/release.yml.
          GENERATED=$(gh api -X POST "repos/${GITHUB_REPOSITORY}/releases/generate-notes" \
            -f tag_name="$TAG" --jq '.body')

          # Pull the section for this version out of CHANGELOG.md so the
          # release body leads with the human-curated summary. Use literal
          # prefix matching (not regex) because the heading contains `[` and
          # `]`, which awk's `~` operator would otherwise treat as a
          # character class and silently fail to match.
          VERSION="${TAG#v}"
          HEADING="## [$VERSION]"
          CHANGELOG_SECTION=$(awk -v heading="$HEADING" '
            index($0, heading) == 1 { found=1; next }
            found && /^## \[/ { exit }
            found
          ' CHANGELOG.md)

          # Match the emoji-prefixed category headings used by the
          # auto-generated "What's Changed" block (configured in
          # .github/release.yml) so both sections feel like one document.
          # CHANGELOG.md keeps plain headings — readers there get clean
          # text; the GitHub release body gets the polished version.
          if [ -n "$CHANGELOG_SECTION" ]; then
            CHANGELOG_SECTION=$(printf '%s' "$CHANGELOG_SECTION" \
              | sed -E \
                  -e 's/^### Features$/### ⭐ Features/' \
                  -e 's/^### Bug Fixes$/### 🐛 Bug Fixes/' \
                  -e 's/^### Performance$/### ⚡ Performance/' \
                  -e 's/^### Documentation$/### 📚 Documentation/' \
                  -e 's/^### Improvements$/### 🔧 Improvements/')
          fi

          {
            if [ -n "$CHANGELOG_SECTION" ]; then
              printf '## ✨ What'\''s New\n\n%s\n\n---\n\n' "$CHANGELOG_SECTION"
            fi
            printf '%s\n\n---\n\n' "$GENERATED"
            printf '## 📦 Downloads\n\n'
            printf '| Platform | Download |\n'
            printf '| -------- | -------- |\n'
            printf '| macOS (Apple Silicon) | [DPlex-arm64.dmg](https://github.com/%s/releases/latest/download/DPlex-arm64.dmg) |\n' "$GITHUB_REPOSITORY"
            printf '| macOS (Intel) | [DPlex-x64.dmg](https://github.com/%s/releases/latest/download/DPlex-x64.dmg) |\n' "$GITHUB_REPOSITORY"
            printf '| Windows | [DPlex-Setup.exe](https://github.com/%s/releases/latest/download/DPlex-Setup.exe) |\n' "$GITHUB_REPOSITORY"
            printf '| Linux (AppImage) | [DPlex.AppImage](https://github.com/%s/releases/latest/download/DPlex.AppImage) |\n' "$GITHUB_REPOSITORY"
            printf '| Linux (Debian) | [DPlex-amd64.deb](https://github.com/%s/releases/latest/download/DPlex-amd64.deb) |\n\n' "$GITHUB_REPOSITORY"
            printf '> Builds are currently unsigned — verify the SHA-256 from this page if you want extra confidence. macOS builds are ad-hoc codesigned; you may still need `xattr -dr com.apple.quarantine /Applications/DPlex.app` on first launch.\n'
          } > /tmp/release-body.md

      - name: Replace release body
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          TAG: ${{ github.ref_name }}
        run: |
          gh release edit "$TAG" --repo "$GITHUB_REPOSITORY" --notes-file /tmp/release-body.md
