appId: dev.dplex.app
productName: DPlex
directories:
  buildResources: build
# Apply an ad-hoc codesignature to the macOS .app after pack but before
# DMG sealing. Without this the published DMG ships an entirely unsigned
# .app (see issue #45 thread). No-op on Windows/Linux; no-op on macOS
# when CSC_LINK is set (real Developer ID signing takes over).
afterPack: scripts/mac-adhoc-sign.mjs
files:
  - '!**/.vscode/*'
  - '!src/*'
  - '!electron.vite.config.{js,ts,mjs,cjs}'
  - '!{.eslintcache,eslint.config.mjs,.prettierignore,.prettierrc.yaml,dev-app-update.yml,CHANGELOG.md,README.md}'
  - '!{.env,.env.*,.npmrc,pnpm-lock.yaml}'
  - '!{tsconfig.json,tsconfig.node.json,tsconfig.web.json}'
  - '!site'
  - '!scripts'
  - '!docs'
asarUnpack:
  - resources/**
win:
  executableName: dplex
nsis:
  # Stable filename so the "releases/latest/download/..." URLs in the README
  # keep working across versions without manual edits.
  artifactName: ${productName}-Setup.${ext}
  shortcutName: ${productName}
  uninstallDisplayName: ${productName}
  createDesktopShortcut: always
mac:
  # `identity: null` disables electron-builder's built-in signing path
  # entirely. We intentionally skip it because its per-component ad-hoc
  # signing leaves the bundled `Electron Framework.framework` with a
  # different (empty/missing) Team ID than the main binary, and macOS
  # 14+ then refuses to load the framework with `"Team IDs differ"`.
  # Instead, the `afterPack` hook in this file runs a single recursive
  # `codesign --deep --sign -` against the fully-packed .app — every
  # nested Mach-O ends up with the same ad-hoc identity, eliminating
  # the mismatch. When CSC_LINK is set in CI, both paths are skipped
  # and electron-builder's real Developer ID signing runs normally.
  identity: null
  entitlementsInherit: build/entitlements.mac.plist
  extendInfo:
    - NSCameraUsageDescription: Application requests access to the device's camera.
    - NSMicrophoneUsageDescription: Application requests access to the device's microphone.
    - NSDocumentsFolderUsageDescription: Application requests access to the user's Documents folder.
    - NSDownloadsFolderUsageDescription: Application requests access to the user's Downloads folder.
  notarize: false
  # Stable filename for .zip target across versions (DMG override below).
  artifactName: ${productName}-${arch}-mac.${ext}
  target:
    - target: dmg
      arch: [arm64, x64]
    # zip target is a reliable fallback: DMG builds can flake on macOS when
    # Spotlight/XProtect hold the fresh-mounted volume, blocking hdiutil
    # detach. The zip is produced without hdiutil and always succeeds.
    - target: zip
      arch: [arm64, x64]
dmg:
  artifactName: ${productName}-${arch}.${ext}
  # LZFSE format often avoids the Spotlight/XProtect-holds-volume-busy
  # issue that causes hdiutil detach to fail on macOS 14+.
  format: ULFO
  writeUpdateInfo: false
linux:
  target:
    - AppImage
    - deb
  maintainer: Ron Borysowski <roni537@gmail.com>
  category: Utility
appImage:
  artifactName: ${productName}.${ext}
deb:
  artifactName: ${productName}-${arch}.${ext}
# Note: `npmRebuild` is intentionally left at its default (true) so
# electron-builder runs @electron/rebuild per target arch when packaging
# multi-arch builds. Disabling it leaks the host runner's host-arch
# native binaries into every arch's DMG — that was the root cause of
# issue #45 (Intel Mac users got arm64 spawn-helper from a macos-latest
# arm64 runner). On macOS, clang cross-compiles x86_64 from arm64 hosts
# out of the box, so a single macos-latest runner produces correct
# binaries for both archs.
publish:
  provider: github
  owner: Ron537
  repo: DPlex
